# How it works: HTTP (port 80/443)
#
# CLIENT
#  ▲  │  HTTP request (Host header)
#  │  ▼
#  │  ├── REVERSE PROXY (TCP 80)
#  │  │     njs preread → extract Host
#  │  │     set $http_preread_server_name (using njs)
#  │  │     proxy stream to $proxied_host_ip:$internal_port
#  │  │
#  │  ├── REVERSE PROXY (TCP 443)
#  │  │     ssl_preread → extract SNI
#  │  │     set $ssl_preread_server_name (native nginx)
#  │  │     proxy stream to $proxied_host_ip:$internal_port
#  │  ▼
#  │  HTTP APP
#  │  │  Handle proxied request and send response
#  └──┘
#

load_module modules/ngx_stream_js_module.so;

user nginx;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

# INFO: Required for get_proxied_host_ip(). We need declare the env var to be able to read it in njs (preread_stream.js).
env PROXIED_HOST_IP;

stream {

  js_import preread_stream from njs/preread_stream.js;
  js_set $http_preread_server_name preread_stream.get_server_name; # will be set in preread phase (for map config)
  js_set $proxied_host_ip preread_stream.get_proxied_host_ip;

  include sites.conf;

  server {
    listen 80;
    # Populate $http_preread_server_name - Read "Host:" form HTTP stream at the preread phase
    # and set "server_name" js var for get_server_name() function to return it.
    js_preread preread_stream.read_server_name;

    proxy_pass $proxied_host_ip:$internal_port;
  }

  server {
    listen 443;
    # Populate $ssl_preread_server_name.
    # Allow extract info from the ClientHello message at the preread phase.
    ssl_preread on;

    proxy_pass $proxied_host_ip:$ssl_internal_port;

    proxy_ssl_verify off;     # don't check cert of proxied server
    proxy_ssl_server_name on; # pass server name to proxied server
  }

  # log_format basic '$remote_addr [$time_local] protocol=$protocol status=$status '
  #   'http_preread_server_name=$http_preread_server_name ssl_preread_server_name=$ssl_preread_server_name '
  #   'server_addr=$server_addr remote_addr=$remote_addr upstream_addr=$upstream_addr';
  # access_log /dev/stdout basic; # access_log /var/log/nginx/access.log basic;
  # error_log  /dev/stderr debug; # error_log  /var/log/nginx/error.log debug;

}

